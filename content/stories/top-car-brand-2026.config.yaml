# Story config — top-car-brand-2026
#
# The reader walks the Focus2Move 2025 country-by-country brand map,
# layered with the IEA Global EV Outlook 2025 EV-sales-share map.
# The journey: Toyota's 25-country empire (Act I), Norway as the
# pure-EV outlier (Act II), Europe's regional loyalty as a brand-
# stable / powertrain-flipping case (Act II), China and the
# local-champion-equals-EV-champion pattern (Act III), the ICE-
# holdout belt (Act IV), and a closing world view that unifies
# the two layers.
#
# COORDINATES (HQ or capital focal points):
#   Toyota City, Japan       137.1567,  35.0833
#   Riyadh, Saudi Arabia      46.6753,  24.7136
#   Bangkok, Thailand        100.5018,  13.7563
#   Sydney, Australia        151.2093, -33.8688
#   Washington DC, USA       -77.0369,  38.9072
#   Oslo, Norway              10.7522,  59.9139
#   Berlin, Germany           13.4050,  52.5200
#   Paris, France              2.3522,  48.8566
#   Rome, Italy               12.4964,  41.9028
#   Prague, Czech Republic    14.4378,  50.0755
#   Shenzhen, China          114.0579,  22.5431  (BYD HQ)
#   Beijing, China           116.4074,  39.9042
#   Hai Phong, Vietnam       106.6881,  20.8449  (VinFast plant)
#   Seoul, South Korea       126.9780,  37.5665
#   Tolyatti, Russia          49.4242,  53.5303  (Lada / AvtoVAZ)
#   Tehran, Iran              51.4215,  35.6892  (Iran Khodro)
#   Nnewi, Nigeria             6.9667,   6.0167  (Innoson)
#   New Delhi, India          77.2090,  28.6139
#   Karachi, Pakistan         67.0011,  24.8607
#
# CHOROPLETH RAMP (EV sales share %, IEA GEO 2025 for 2024 actuals):
#   [0, 5, 15, 30, 60, 90]
#     → [$surface, $accent2, $amber, $teal, $accent, $accent]
#   The deep-blue end ($accent) marks the EV-finished markets;
#   the warm end ($accent2 / $amber) marks the petrol-and-hybrid bulk.


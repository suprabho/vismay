id: ebola-2026
slug: ebola-2026
title: "A new Ebola is moving through a war."
deck: >
  Bundibugyo virus — only the third outbreak of this species ever —
  is spreading from a gold-mining town in eastern Congo into Kampala.
  There is no licensed vaccine, no licensed treatment, and no clean
  live data feed.
status: active
species: Bundibugyo
species_scientific: Orthoebolavirus bundibugyoense
countries:
  - DR Congo
  - Uganda
reporting_date: 2026-05-29
data_cutoff: 2026-05-26
pheic_declared: 2026-05-17
authors:
  - Vizmaya editorial
license: CC-BY-4.0

tokens:
  paper:  "#f5f1ea"
  paper2: "#ebe6dd"
  ink:    "#0f0e0c"
  rule:   "#d8d2c5"
  muted:  "#6b665d"
  accent: "#c4391c"
  warn:   "#c79100"
  good:   "#2d6a4f"
  species:
    zaire:      "#6a1818"
    sudan:      "#5c4ba0"
    bundibugyo: "#c4391c"
    tai:        "#2d6a4f"
    reston:     "#6b665d"

datasets:
  outbreaks_history:
    file: ebola_outbreaks_history.csv
    schema: [year, country, location, species, cases, deaths, cfr_pct, notes]
    rows: 58
    coverage: 1976-2026
    source_of_record: CDC Outbreak History
  drc_zones_2026:
    file: drc_2026_health_zones.csv
    schema: [province, health_zone, confirmed_cases, confirmed_deaths, suspected_cases, listed_contacts, notes]
    coverage: Ituri + North Kivu + South Kivu + Kampala
    source_of_record: DRC MoH via WHO DON
  timeline_2026:
    file: timeline_2026.csv
    schema: [date, event, location, source]
    coverage: 2026-04-24 to 2026-05-26
  by_species:
    file: by_species.csv
    schema: [species, scientific_name, first_identified, outbreaks_count, total_cases, total_deaths, typical_cfr_pct, vaccine_status, treatment_status]
  genomic_2026:
    file: genomic_2026.csv
    schema: [aspect, value, source]
    source_of_record: Nextstrain + virological.org

charts:
  growth:
    file: charts/growth.json
    type: line
    title: "Doubling roughly every five days"
    series: [confirmed, suspected]
    data_from: timeline_2026
  countries:
    file: charts/countries.json
    type: bar-horizontal
    title: "Cumulative cases by country, 1976–2026"
    data_from: outbreaks_history
  health_zones:
    file: charts/health-zones.json
    type: bar-horizontal
    title: "Confirmed cases by health zone, Ituri"
    data_from: drc_zones_2026
  species:
    file: charts/species.json
    type: column-grouped
    title: "By species — cases and CFR"
    data_from: by_species
  genome:
    file: charts/genome-timeline.json
    type: scatter
    title: "BDBV genomes through time"
    data_from: genomic_2026
  events:
    file: charts/outbreak-timeline.json
    type: timeline
    title: "From hospital cluster to PHEIC in 12 days"
    data_from: timeline_2026

sections:
  - id: now
    label: "As of 26 May 2026"
    kind: kpi-grid
    items:
      - { label: "Confirmed cases",  value: 128,   sub: "DRC 121 · Uganda 7" }
      - { label: "Confirmed deaths", value: 18,    sub: "CFR ≈ 14% (rising)" }
      - { label: "Suspected cases",  value: 1077,  sub: "238 suspected deaths", accent: true }
      - { label: "Health zones affected", value: "9+", sub: "Ituri, N. Kivu, S. Kivu" }
  - id: growth
    label: "Growth"
    kind: chart
    chart: growth
  - id: zones
    label: "Where the cases sit"
    kind: chart
    chart: health_zones
  - id: timeline
    label: "From hospital cluster to PHEIC in 12 days"
    kind: chart
    chart: events
  - id: countries
    label: "Five countries hold 95% of Ebola history"
    kind: chart
    chart: countries
  - id: species
    label: "Ebola is not one disease"
    kind: chart
    chart: species
  - id: genome
    label: "A new spillover, not a survivor relapse"
    kind: chart
    chart: genome
  - id: data
    label: "Data accessibility for builders"
    kind: source-table


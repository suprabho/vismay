caveats:
  - Numbers move daily; figures anchored to 26–27 May 2026.
  - Conflict in eastern DRC suppresses surveillance → real transmission likely higher than reported.
  - Suspected → confirmed reclassification produces downward revisions that look like errors.
  - WHO / CDC / ECDC / DRC MoH cite slightly different totals at the same point in time.
  - ProMED reliability has been questioned since 2022; supplement, not source of record.

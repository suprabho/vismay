    - { title: "WHO DON 2026-DON602",          url: "https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON602" }
    - { title: "WHO PHEIC declaration 17 May", url: "https://www.who.int/news/item/17-05-2026-epidemic-of-ebola-disease-in-the-democratic-republic-of-the-congo-and-uganda-determined-a-public-health-emergency-of-international-concern" }
    - { title: "WHO DG remarks 20 May",        url: "https://www.who.int/news-room/speeches/item/who-director-general-s-opening-remarks-at-the-media-briefing-on-ebola-outbreak-in-drc-and-uganda-20-may-2026" }
    - { title: "WHO situation page",            url: "https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026" }
    - { title: "US CDC situation summary",      url: "https://www.cdc.gov/ebola/situation-summary/index.html" }
    - { title: "US CDC outbreak history",       url: "https://www.cdc.gov/ebola/outbreaks/index.html" }
    - { title: "US CDC HAN 530",                url: "https://www.cdc.gov/han/php/notices/han00530.html" }
  tier1_regional:
    - { title: "ECDC outbreak page",            url: "https://www.ecdc.europa.eu/en/ebola-virus-disease-outbreak-democratic-republic-congo-and-uganda" }
    - { title: "Africa CDC situation report",   url: "https://africacdc.org/download/situation-report-bundibugyo-virus-disease-outbreak-in-the-drc-and-uganda/" }
    - { title: "WHO AFRO weekly bulletin",      url: "https://www.afro.who.int/health-topics/disease-outbreaks/outbreaks-and-other-emergencies-updates" }

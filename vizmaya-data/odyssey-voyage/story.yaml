caveats:
  - The geography is genuinely unresolved and probably unresolvable; most classicists treat Books 9-12 as imaginary.
  - Every landfall after Cape Malea is contested. Present routes as layers, never assert one as true.
  - Coordinates for mythic sites are traditional/literary associations, not proven locations. Only Troy, Ismaros/Maroneia and the Ithaki/Kefalonia zone rest on excavation.
  - The Necromanteion's Homeric link is now contested — the ruins date no earlier than the later 4th c. BCE and may be a fortified farmhouse.
  - Fleet numbers (720 men / 12 ships, ~60 per ship) are reconstructed; Homer is not perfectly explicit and translations vary.
  - The Severin galley spec has a minor source conflict (54 ft / ~20 oars vs a local 14 m / 22-rower figure) — confirm against the primary book before publishing a precise number.
  - Distance figures vary by method (straight-line ~565 nm vs actual coast-following routes of "several thousand miles"); always state which you mean.

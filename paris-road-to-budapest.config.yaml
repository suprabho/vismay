# Story config — paris-road-to-budapest (DECK format)
#
# PSG's 2025/26 UEFA Champions League run, authored from the "Road to Budapest"
# infographic, told as a snap-scrolling deck over a single page-level aura.
# Footshorts (fs:) viz modules render the data:
#   - fs:standings-table  → the league-phase mini-table (10th–12th)
#   - fs:match-card       → each two-legged knockout tie, leg by leg
#   - fs:bracket (tree)   → the full 16-team mirrored draw, PSG's path highlighted
# Crests resolve from the bundled palette (football-data.org) via crest_url:null;
# competition_slug is `champions-league` so the emblem/watermark theme correctly.

defaults:
  mapOpacity: 0
  storyBackground:
    type: aura
    slug: blue-abstract-background-patriotic-stars-flowing-lines
    tint: "#070a14"
    tintBlendMode: multiply
    fixed: true
  overlay:
    color: "#070a14"
    opacity: 0.42
    gradient:
      type: radial
      from: "rgba(7,10,20,0.18)"
      to: "rgba(7,10,20,0.76)"
  panel:
    background: "rgba(10,16,38,0.62)"
    border: "1px solid rgba(120,140,180,0.20)"
    borderRadius: "20px"
    padding: "28px"
    backdropBlur: "18px"
    shadow: "0 24px 60px -32px rgba(0,0,0,0.65)"
  scroll:
    mode: snap
    paddingY: "12vh"
  progress: true

sections:

  # 1 · Cover -----------------------------------------------------------------
  - id: cover
    kind: cover
    text: "Cover"
    eyebrow: "UEFA Champions League · 2025/26"
    heading: "Paris: Road to Budapest"
    dek: "Eleventh in the league phase, and then a knockout run that didn't stop — Monaco, Chelsea, Liverpool, Bayern — and Arsenal in the Budapest final, settled on penalties. Champions of Europe."
    background: { type: none }
    panel:
      background: "transparent"
      border: "none"
      backdropBlur: "0"

  # 2 · League phase ----------------------------------------------------------
  - id: league-phase
    kind: data
    text: "Eleventh, and through"
    paragraphs: [0, 2]
    layout: free
    foreground:
      - type: bodyText
        from: text
        style:
          position: { x: left, y: center }
          size: { width: "38%" }
      - type: fs:standings-table
        rows:
          - competition_slug: champions-league
            season: 25-26
            team_id: inter
            position: 10
            played: 8
            won: 5
            draw: 0
            lost: 3
            goals_for: 15
            goals_against: 7
            goal_difference: 8
            points: 15
            form: null
            team: { id: inter, slug: inter, name: Inter Milan, crest_url: null }
          - competition_slug: champions-league
            season: 25-26
            team_id: psg
            position: 11
            played: 8
            won: 4
            draw: 2
            lost: 2
            goals_for: 21
            goals_against: 11
            goal_difference: 10
            points: 14
            form: null
            team: { id: psg, slug: psg, name: Paris Saint-Germain, crest_url: null }
          - competition_slug: champions-league
            season: 25-26
            team_id: newcastle
            position: 12
            played: 8
            won: 4
            draw: 2
            lost: 2
            goals_for: 17
            goals_against: 7
            goal_difference: 10
            points: 14
            form: null
            team: { id: newcastle, slug: newcastle, name: Newcastle United, crest_url: null }
        style:
          position: { x: right, y: center }
          size: { width: "54%" }

  # 3 · Play-off --------------------------------------------------------------
  - id: playoff
    kind: split
    text: "Play-off: past Monaco"
    paragraphs: [0, 2]
    layout: free
    foreground:
      - type: bodyText
        from: text
        style:
          position: { x: left, y: center }
          size: { width: "38%" }
      - type: fs:match-card
        layout: horizontal
        home: Monaco
        away: psg
        score: 2 – 3
        kickoff: FT
        competition: Champions League · Play-off, 1st leg
        competitionSlug: champions-league
        homeColor: '#CE3524'
        awayColor: '#004170'
        style:
          position: { x: right, y: top }
          size: { width: "48%" }
      - type: fs:match-card
        layout: horizontal
        home: psg
        away: Monaco
        score: 2 – 2
        kickoff: FT
        competition: Champions League · Play-off, 2nd leg · Paris win 5–4 agg
        competitionSlug: champions-league
        homeColor: '#004170'
        awayColor: '#CE3524'
        style:
          position: { x: right, y: bottom }
          size: { width: "48%" }


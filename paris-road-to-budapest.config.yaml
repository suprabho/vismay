    layout: free
    foreground:
      - type: bodyText
        from: text
        style:
          position: { x: left, y: center }
          size: { width: "38%" }
      - type: fs:match-card
        layout: horizontal
        home: psg
        away: bayern
        score: 5 – 4
        kickoff: FT
        competition: Champions League · Semi-final, 1st leg
        competitionSlug: champions-league
        homeColor: '#004170'
        awayColor: '#DC052D'
        style:
          position: { x: right, y: top }
          size: { width: "48%" }
      - type: fs:match-card
        layout: horizontal
        home: bayern
        away: psg
        score: 1 – 1
        kickoff: FT
        competition: Champions League · Semi-final, 2nd leg · Paris win 6–5 agg
        competitionSlug: champions-league
        homeColor: '#DC052D'
        awayColor: '#004170'
        style:
          position: { x: right, y: bottom }
          size: { width: "48%" }


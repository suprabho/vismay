name: Social ingest — YouTube

# Pulls comments + replies on the configured channel's recent uploads
# every 30 min and upserts into engagement_event. Idempotent on
# (platform, external_id) so re-runs and manual dispatches are safe.
#
# Required repo secrets (in the `Production` environment):
#   NEXT_PUBLIC_SUPABASE_URL    — same value as Vercel env
#   SUPABASE_SERVICE_ROLE_KEY   — service role key (writes to engagement_event)
#   YOUTUBE_API_KEY             — Data API v3 key (read-only is fine)
#   YOUTUBE_CHANNEL_ID          — the channel whose comments we ingest

on:
  schedule:
    # Every 30 min, offset 7 to dodge top-of-hour queue spikes.
    - cron: '7,37 * * * *'
  workflow_dispatch:

concurrency:
  group: social-ingest-youtube
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Ingest YouTube comments
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: pnpm social:ingest-youtube

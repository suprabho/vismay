# Story config — india-aviation-cut-2026
#
# Source: The Hindu / Business Today / Outlook Business reporting (May 27, 2026),
# EIA STEO (May 12, 2026), AERA tariff orders. Eleven airports named for cuts.
#
# Repeating coordinates:
#   Mumbai (BOM)          72.8777  19.0760
#   New Delhi (DEL)       77.1025  28.5562
#   Bengaluru (BLR)       77.7080  13.1986
#   Hyderabad (HYD)       78.4294  17.2403
#   Chennai (MAA)         80.1693  12.9941
#   Ahmedabad (AMD)       72.6346  23.0775
#   Kolkata (CCU)         88.4467  22.6543
#   Nagpur (NAG)          79.0473  21.0922
#   Patna (PAT)           85.0867  25.5913
#   Varanasi (VNS)        82.8631  25.4524
#   Bhopal (BHO)          77.3374  23.2873

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#e8a04f"
  pinRadius: 12
  flySpeed: 1.2

sections:

  # ═══════════════════════════════════════════════
  # HERO — India view, Mumbai + Delhi pinned
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "The Sky Closes for the Summer"
    eyebrow: "India · Aviation · June–August 2026"
    map:
      center: [78.5, 22.0]
      zoom: 3.6
      pitch: 20
      bearing: 0
      opacity: 0.45
      pins:
        - coordinates: [72.8777, 19.0760]
          label: "Mumbai · 280 weekly cuts"
          color: "#e8a04f"
          radius: 14
          pulse: true
        - coordinates: [77.1025, 28.5562]
          label: "Delhi · 3 trunk routes"
          color: "#e8a04f"
          radius: 12
          pulse: true
      mobile:
        center: [78.0, 22.5]
        zoom: 3.0

  # ═══════════════════════════════════════════════
  # OPENING STAT — 250+ a day
  # ═══════════════════════════════════════════════

  - id: opening-stat
    kind: stat
    text: "250+"
    mobileParagraphs:
      - [0, 1]
      - [1, 3]
      - [3, 5]
    map:
      center: [78.0, 22.0]
      zoom: 3.8
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [72.8777, 19.0760]
          label: "Mumbai · AI hub"
          color: "#e8a04f"
          labelAnchor: left
        - coordinates: [77.1025, 28.5562]
          label: "Delhi · both carriers"
          color: "#e8a04f"
          labelAnchor: right
        - coordinates: [77.7080, 13.1986]
          label: "Bengaluru · return legs"
          color: "#3a7a8c"
          labelAnchor: right
        - coordinates: [78.4294, 17.2403]
          label: "Hyderabad · Delhi sector"
          color: "#3a7a8c"
          labelAnchor: top
      mobile:
        center: [78.0, 22.0]
        zoom: 3.0

  # ═══════════════════════════════════════════════
  # THE BARREL — Brent spike chart
  # ═══════════════════════════════════════════════

  - id: the-barrel
    text: "The barrel"

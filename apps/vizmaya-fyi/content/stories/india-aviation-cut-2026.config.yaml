      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [78.0, 22.0]
      zoom: 4.4
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [72.8777, 19.0760]
          label: "Mumbai (BOM) — 280 weekly departures pulled"
          color: "#e8a04f"
          radius: 14
          labelAnchor: left
        - coordinates: [72.6346, 23.0775]
          label: "Ahmedabad (AMD)"
          color: "#d9a84a"
          labelAnchor: left
        - coordinates: [79.0473, 21.0922]
          label: "Nagpur (NAG)"
          color: "#d9a84a"
          labelAnchor: right
        - coordinates: [82.8631, 25.4524]
          label: "Varanasi (VNS)"
          color: "#d9a84a"
          labelAnchor: right
        - coordinates: [85.0867, 25.5913]
          label: "Patna (PAT)"
          color: "#d9a84a"
          labelAnchor: right
        - coordinates: [77.3374, 23.2873]
          label: "Bhopal (BHO)"

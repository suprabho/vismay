          color: "#e8a04f"
          radius: 14
          labelAnchor: right
        - coordinates: [78.4294, 17.2403]
          label: "Hyderabad (HYD)"
          color: "#d9a84a"
          labelAnchor: right
        - coordinates: [77.7080, 13.1986]
          label: "Bengaluru (BLR)"
          color: "#d9a84a"

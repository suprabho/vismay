# Story config — ebola-2026
#
# Format: MapStory (legacy map-anchored).
# Source: WHO DON 602/603 (21 May, 26 May 2026), WHO PHEIC declaration
# (17 May 2026), Africa CDC weekly, ECDC, US CDC outbreak history,
# Nextstrain BDBV build, virological.org.
#
# Repeating coordinates [lon, lat]:
#   Mongbwalu (epicentre)      30.0378   1.9501
#   Bunia (Ituri capital)      30.2469   1.5662
#   Rwampara (health zone)     30.2000   1.5500
#   Goma                       29.2228  -1.6792
#   Kampala                    32.5825   0.3476
#   Yambuku (1976 spillover)   22.1800   2.8500
#   Nzara (Sudan virus 1976)   28.2100   4.6485
#   Bundibugyo (BDBV 2007)     30.0639   0.7100
#   Freetown                  -13.2299   8.4844
#   Monrovia                  -10.8074   6.3007
#   Conakry                   -13.6776   9.5093
#   Juba                       31.5825   4.8517
#   Geneva (WHO)                6.1432  46.2044
#   Stockholm (ECDC)           18.0686  59.3293
#   Atlanta (US CDC)          -84.3880  33.7490
#   Frankfurt                   8.6821  50.1109

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#c4391c"
  pinRadius: 12
  flySpeed: 1.2

sections:

  # ═══════════════════════════════════════════════
  # HERO — Africa wide, three epicentre pins
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "A New Ebola is Moving Through a War"
    eyebrow: "Public health · May 2026 · Bundibugyo virus"
    map:
      center: [27.0, 1.5]
      zoom: 3.4
      pitch: 25
      bearing: 0
      opacity: 0.45
      pins:
        - coordinates: [30.0378, 1.9501]
          label: "Mongbwalu · epicentre"
          color: "#c4391c"
          radius: 14
          pulse: true
        - coordinates: [30.2469, 1.5662]
          label: "Bunia · transit hub"
          color: "#c4391c"
          radius: 12
        - coordinates: [32.5825, 0.3476]
          label: "Kampala · imported cases"
          color: "#c79100"
          radius: 12
          pulse: true
      mobile:
        center: [29.0, 1.0]
        zoom: 2.8

  # ═══════════════════════════════════════════════
  # 128 — KPI / opening stat
  # ═══════════════════════════════════════════════

  - id: opening-stat
    kind: stat
    text: "128"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [30.5, 1.2]
      zoom: 5.4
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [30.0378, 1.9501]
          label: "Mongbwalu · 19 confirmed"
          color: "#c4391c"
          radius: 14
          labelAnchor: left
        - coordinates: [30.2469, 1.5662]
          label: "Bunia · 24 confirmed"
          color: "#c4391c"
          labelAnchor: right
        - coordinates: [32.5825, 0.3476]
          label: "Kampala · 7 confirmed"
          color: "#c79100"
          labelAnchor: right
      mobile:
        center: [31.0, 1.0]
        zoom: 4.6

  # ═══════════════════════════════════════════════
  # THREE THINGS — species, conflict, air hub
  # ═══════════════════════════════════════════════

  - id: three-things
    text: "Three things make this outbreak unlike the last decade"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
      - [3, 4]
    map:
      center: [22.0, 1.5]
      zoom: 3.6
      pitch: 20
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [30.0378, 1.9501]
          label: "Mongbwalu · gold-mining hub"
          color: "#c4391c"
          radius: 14
          labelAnchor: left
        - coordinates: [30.2469, 1.5662]
          label: "Bunia"
          color: "#c4391c"
          labelAnchor: right
        - coordinates: [32.5825, 0.3476]
          label: "Kampala · 24h apart"
          color: "#c79100"
          labelAnchor: right
        - coordinates: [8.6821, 50.1109]
          label: "Germany · evacuated"
          color: "#7c8088"
          labelAnchor: top
      mobile:
        center: [25.0, 5.0]
        zoom: 2.4

  # ═══════════════════════════════════════════════
  # DOUBLING EVERY FIVE DAYS — growth chart
  # ═══════════════════════════════════════════════

  - id: growth
    text: "Doubling every five days"
    chart: data:growth
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [30.15, 1.75]
      zoom: 6.4
      pitch: 30
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [30.0378, 1.9501]
          label: "Mongbwalu · 19"
          color: "#c4391c"
          labelAnchor: left
        - coordinates: [30.2000, 1.5500]
          label: "Rwampara · 32 confirmed · 621 contacts"
          color: "#c4391c"
          radius: 14
          labelAnchor: bottom
        - coordinates: [30.2469, 1.5662]
          label: "Bunia · 24"
          color: "#c4391c"
          labelAnchor: right
      mobile:
        center: [30.15, 1.75]
        zoom: 5.4

  # ═══════════════════════════════════════════════
  # SPECIES — Ebola is not one disease
  # ═══════════════════════════════════════════════

  - id: species
    text: "Ebola is not one disease"
    chart: data:species
    mobileParagraphs:
      - [0, 1]
      - [1, 3]
      - [3, 4]
    map:
      center: [20.0, 5.0]
      zoom: 2.6
      pitch: 15
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [22.1800, 2.8500]
          label: "Yambuku · Zaire 1976"
          color: "#6a1818"
          labelAnchor: top
        - coordinates: [28.2100, 4.6485]
          label: "Nzara · Sudan 1976"
          color: "#5c4ba0"
          labelAnchor: right
        - coordinates: [30.0639, 0.7100]
          label: "Bundibugyo 2007"
          color: "#c4391c"
          radius: 14
          labelAnchor: right
        - coordinates: [-7.4000, 5.8500]
          label: "Taï Forest 1994"
          color: "#2d6a4f"
          labelAnchor: left
        - coordinates: [120.9842, 14.5995]
          label: "Reston · animal only"
          color: "#7c8088"
          labelAnchor: top
      mobile:
        center: [30.0, 5.0]
        zoom: 1.8

  # ═══════════════════════════════════════════════
  # HISTORY — five countries hold 95%
  # ═══════════════════════════════════════════════

  - id: history
    text: "Five countries hold 95% of the history"
    chart: data:countries
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
      - [3, 4]
    map:
      center: [5.0, 6.0]
      zoom: 2.6
      pitch: 15
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [22.1800, 2.8500]
          label: "DRC · 17 outbreaks"
          color: "#c4391c"
          radius: 14
          labelAnchor: top
        - coordinates: [-13.2299, 8.4844]
          label: "Sierra Leone · 14,124"
          color: "#c4391c"
          labelAnchor: left
        - coordinates: [-10.8074, 6.3007]
          label: "Liberia · 10,678"
          color: "#c4391c"
          labelAnchor: left
        - coordinates: [-13.6776, 9.5093]
          label: "Guinea · 3,837"
          color: "#c4391c"
          labelAnchor: left
        - coordinates: [32.5825, 0.3476]
          label: "Uganda · 8 outbreaks"
          color: "#c79100"
          labelAnchor: right
        - coordinates: [31.5825, 4.8517]
          label: "South Sudan"
          color: "#c79100"
          labelAnchor: right
      mobile:
        center: [10.0, 6.0]
        zoom: 1.6

  # ═══════════════════════════════════════════════
  # SPILLOVER — genome timeline
  # ═══════════════════════════════════════════════

  - id: spillover
    text: "A new spillover, not a survivor relapse"
    chart: data:genome
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [30.05, 1.95]
      zoom: 6.8
      pitch: 30
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [30.0378, 1.9501]
          label: "Mongbwalu · 2026 BDBV"
          color: "#c4391c"
          radius: 14
          labelAnchor: right
        - coordinates: [30.0639, 0.7100]
          label: "Bundibugyo 2007 · prior lineage"
          color: "#7c8088"
          labelAnchor: bottom
      mobile:
        center: [30.05, 1.5]
        zoom: 5.8

  # ═══════════════════════════════════════════════
  # DATA ACCESS — global surveillance hubs
  # ═══════════════════════════════════════════════

  - id: data-access
    text: "The data is human-readable, not machine-readable"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [-10.0, 40.0]
      zoom: 1.8
      pitch: 10
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [6.1432, 46.2044]
          label: "Geneva · WHO DON"
          color: "#c4391c"
          radius: 14
          labelAnchor: top
        - coordinates: [18.0686, 59.3293]
          label: "Stockholm · ECDC CDTR"
          color: "#c79100"
          labelAnchor: top
        - coordinates: [-84.3880, 33.7490]
          label: "Atlanta · US CDC"
          color: "#c79100"
          labelAnchor: top
        - coordinates: [38.7613, 9.0054]
          label: "Addis · Africa CDC"
          color: "#c79100"
          labelAnchor: bottom
      mobile:
        center: [0.0, 30.0]
        zoom: 1.0

  # ═══════════════════════════════════════════════
  # WHAT WOULD CHANGE THE PICTURE — Goma watch
  # ═══════════════════════════════════════════════

  - id: what-changes
    text: "What would change the picture"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [30.0, 0.0]
      zoom: 5.0
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [29.2228, -1.6792]
          label: "Goma · second-city risk"
          color: "#c4391c"
          radius: 14
          labelAnchor: left
        - coordinates: [32.5825, 0.3476]
          label: "Kampala · sustained transmission?"
          color: "#c79100"
          labelAnchor: right
        - coordinates: [30.0378, 1.9501]
          label: "Mongbwalu · trial site?"
          color: "#7d9a6f"
          labelAnchor: top
      mobile:
        center: [30.5, 0.0]
        zoom: 4.0

  # ═══════════════════════════════════════════════
  # CLOSE — twelve days, gold-mining town
  # ═══════════════════════════════════════════════

  - id: closing
    text: "Twelve days, no vaccine, and a gold-mining town"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [30.0378, 1.9501]
      zoom: 7.2
      pitch: 35
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [30.0378, 1.9501]
          label: "Mongbwalu"
          color: "#c4391c"
          radius: 16
          pulse: true
          labelAnchor: right
      mobile:
        center: [30.0378, 1.9501]
        zoom: 6.2

  # ═══════════════════════════════════════════════
  # METHODOLOGY & SOURCES
  # ═══════════════════════════════════════════════

  - id: methodology
    text: "Methodology & sources"
    mobileParagraphs:
      - [0, 2]
      - [2, 4]
      - [4, 6]
    map:
      center: [20.0, 5.0]
      zoom: 2.6
      pitch: 10
      bearing: 0
      opacity: 0.45
      pins:
        - coordinates: [6.1432, 46.2044]
          label: "WHO"
          color: "#7c8088"
          labelAnchor: top
        - coordinates: [-84.3880, 33.7490]
          label: "US CDC"
          color: "#7c8088"
          labelAnchor: top
        - coordinates: [38.7613, 9.0054]

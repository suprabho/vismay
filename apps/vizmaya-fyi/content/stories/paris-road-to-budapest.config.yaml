# Story config — paris-road-to-budapest
#
# Authored from the "PARIS · Road to Budapest 26" infographic (PSG's 2025/26
# UEFA Champions League run). Uses the footshorts (fs:) viz modules registered
# by `vertical: footshorts` in the .md frontmatter:
#   - fs:standings-table          → the league-phase mini-table (10th–12th)
#   - fs:match-card               → each two-legged knockout tie, leg by leg
#   - fs:bracket                  → the full knockout path, aggregates auto-built
# All data is shaped exactly like the live Supabase rows (StandingRow / FixtureRow)
# so it's drop-in. Scores are taken verbatim from the infographic.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.4
  pinColor: '#e2117a'
  pinRadius: 12
  flySpeed: 1.2
sections:
- id: league-phase
  text: Eleventh, and through
  foreground:
  - type: fs:standings-table
    rows:
    - competition_slug: ucl
      season: 25-26
      team_id: inter
      position: 10
      played: 8
      won: 5
      draw: 0
      lost: 3
      goals_for: 15
      goals_against: 7
      goal_difference: 8
      points: 15
      form: null
      team:
        id: inter
        slug: inter
        name: Inter Milan
        crest_url: null
    - competition_slug: ucl
      season: 25-26

# Story config — _sample-adani-map  (CARTOGRAPHIC reference)
#
# This is the "Kashmir-style" cartographic recreation of the Adani story:
# a scroll-driven PROSE RAIL over a live map, with charts attached via the
# legacy `chart: data:<id>` field and place data carried by `map.pins`.
#
# It deliberately uses NO `foreground:` panels. On a map story a foreground
# slot SUPPRESSES the section's prose rail (see DECK_KINDS_NO_TEXT_CARD in
# MapStorySection.tsx) — which is why the earlier deck version of this file
# rendered none of the rich narrative in _sample-adani-map.md. The deck
# (panel-over-map) version is preserved in git history.
#
# Mode/format guide: apps/vizmaya-fyi/docs/map-story-authoring.md
#
# Section `text:` must match a markdown `#`/`##` heading (anchor lookup is
# level-agnostic + case/dash tolerant). Charts resolve from
# _sample-adani-map/charts/<id>.json via `chart: data:<id>`.
#
# NOTE — choropleth: this story's data is point/site-based (specific airports,
# Khavda, Godda, silo corridors), so the faithful cartographic treatment is a
# prose rail + rich pins, NOT a forced state choropleth. For an areal-metric
# example of `map.regions`, see kashmir-1941-land-reform.config.yaml.

defaults:
  scroll:
    mode: continuous
  chart:
    theme: light-editorial
  mapStyle: mapbox://styles/mapbox/light-v11
  mapOpacity: 0.6
  pinColor: "#d4612a"
  pinRadius: 8
  flySpeed: 1.2


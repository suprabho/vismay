  - id: godda-one-plant-one-customer
    text: "Godda: One Plant, One Customer"
    kind: bodyText
    foreground:
      layout: text-left-chart-right
      regions:
        text:
          - type: bodyText
            from: text
            content: Adani Power's 1,600-MW Godda plant is the only Indian generating station licensed to export 100% of its output — every unit crosses into Bangladesh under a long-term BPDB contract. No equivalent arrangement exists anywhere else in Indian energy policy.
            heading: "Godda: One Plant, One Customer"
            showHeading: true
            textStyle:
              size: small
              color: text
        chart:
          - type: keyValue
            title: Documented Structural Privileges
            items:
              - key: SEZ status granted
                value: Tax exemptions unavailable to any conventional generator
                color: red
              - key: Telegraph Act powers
                value: Right-of-way over 400-kV line corridor — no other cross-border producer holds this
                color: amber
              - key: Aug 2024 MoP amendment
                value: Clause 8.9 proviso on co-use of dedicated line — Godda is currently the only plant it can affect
                color: accent2
              - key: Clause 8.9 origin
                value: Present in original Dec 2018 guidelines — NOT inserted in Jul 2019 (that addendum changed only clause 5.2a)
                color: muted
    map:
      center:
        - 87.2
        - 24.5
      zoom: 7.5
      pitch: 30
      bearing: 10
      pins:
        - coordinates:
            - 87.21
            - 24.83
          label: Godda, Jharkhand
          color: red
          radius: 8
        - coordinates:
            - 88.95
            - 23.62
          label: Bangladesh border
          color: amber
          radius: 6

  - id: western-ghats-where-the-claim-breaks-dow
    text: "Western Ghats: Where the Claim Breaks Down"
    kind: bodyText
    foreground:
      layout: text-left-chart-right
      regions:
        text:
          - type: bodyText
            from: text
            content: Maharashtra MoU (June 2022) and fast preliminary appraisals are real and documented. But the EAC ultimately rejected Adani's flagship mining expansion and applied heightened scrutiny to all Western Ghats pumped-storage projects — not only Adani's. The anomalously fast final-clearance claim is not borne out.
            heading: "Western Ghats: Two-Part Verdict"
            showHeading: true
            textStyle:
              size: small
              color: muted
        chart:
          - type: keyValue
            title: Verdict at a Glance
            items:
              - key: MoU value (June 2022)
                value: ₹60,000 crore
                color: amber
              - key: Fast preliminary appraisals
                value: Documented
                color: amber
              - key: Clearance-speed claim (final decisions)
                value: Overstated
                color: red
              - key: "EAC outcome: flagship mining expansion"
                value: Rejected / Returned
                color: positive
              - key: "Extra scrutiny: all pumped-storage projects"
                value: Applied broadly
                color: teal
              - key: Conflict of interest (Adani adviser on EAC)
                value: Documented
                color: accent
    map:
      center:
        - 74.5
        - 15.5
      zoom: 6.5
      pitch: 30
      bearing: -10
      pins:
        - coordinates:
            - 73.8
            - 19
          label: Maharashtra MoU zone
          color: amber
        - coordinates:
            - 74.2
            - 15.3
          label: EAC rejected mining expansion
          color: positive
        - coordinates:
            - 74
            - 14
          label: Pumped-storage scrutiny zone
          color: teal


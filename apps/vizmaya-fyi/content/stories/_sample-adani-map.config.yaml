  - id: one-pattern-five-sectors-2
    text: One Pattern, Five Sectors
    kind: split
    foreground:
      layout: text-left-chart-right
      regions:
        text:
          - type: bodyText
            from: text
            content: In four of five sectors, government technical bodies proposed a safeguard — then were overruled. Adani subsequently won a disproportionate share of what was on offer. The fifth claim is overstated.
            heading: One Pattern, Five Sectors
            showHeading: true
            textStyle:
              size: small
              color: muted
        chart:
          - type: keyValue
            title: "Five Sectors: Safeguard → Outcome"
            items:
              - key: ✈ Airports
                value: Cap & experience req. dropped → Adani won all 6
                color: amber
              - key: 🌾 FCI Silos
                value: Anti-monopoly clause dropped → 78% to Adani + Leap India
                color: amber
              - key: ☀ Khavda Land
                value: Border rules relaxed → Adani largest parcel (19,000 ha)
                color: amber
              - key: ⚡ Godda Power
                value: SEZ + Telegraph Act + grid amendment → only 100%-export plant
                color: amber
              - key: 🌿 W. Ghats
                value: EAC rejected expansion — conflict of interest documented
                color: muted
    map:
      center:
        - 80.5
        - 22.5
      zoom: 4.2
      pitch: 0
      bearing: 0
      pins:

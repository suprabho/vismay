  - id: godda-india-s-only-100-export-plant
    text: "Godda: India's Only 100% Export Plant"
    kind: quote
    foreground:
      layout: panel-left
      regions:
        text:
          - type: quote
            text: Godda is, factually, the only Indian plant contracted to export **100% of its output** to a neighbouring country.
            attribution: Cross-party fact-check conclusion — undisputed by all parties
            align: left
        chart:
          - type: keyValue
            title: Three Unprecedented Regulatory Privileges
            items:
              - key: SEZ Status
                value: No precedent for a captive cross-border power facility in India
                color: red
              - key: Telegraph Act Powers
                value: Right-of-way to lay dedicated Bangladesh transmission line — bypassing normal private-developer easements
                color: amber
              - key: Aug 2024 Grid Amendment
                value: MoP OM amended clauses 5.2(a) & 8.9 — 'may permit' co-connection to national grid; in practice applies only to Godda
                color: accent2
    map:
      center:
        - 87.2
        - 24.6
      zoom: 7
      pitch: 30
      bearing: 10
      pins:
        - coordinates:
            - 87.2185
            - 24.5873

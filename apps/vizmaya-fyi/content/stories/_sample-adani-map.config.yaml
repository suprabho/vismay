  - id: five-sectors-one-pattern
    text: Five Sectors, One Pattern
    kind: stat
    foreground:
      layout: panel-right
      regions:
        text:
          - type: bodyText
            from: text
            content: 4 of 5 claims rated substantially accurate. In each sector, a safeguard proposed by a government body was overruled — and Adani was among the primary beneficiaries.
            heading: Five Sectors, One Pattern
            showHeading: true
            textStyle:
              size: small
              color: muted
        chart:
          - type: keyValue
            title: Safeguard Dropped → Adani Outcome
            items:
              - key: ✈ Airports
                value: 2-airport cap & experience req. dropped → Adani wins all 6
                color: accent
              - key: 🌾 Grain Silos
                value: FCI anti-monopoly clause dropped → ₹9,700 cr in contracts
                color: accent
              - key: ☀ Kutch RE Land
                value: Defence border rules relaxed → largest share (~19,000 ha)
                color: accent
              - key: ⚡ Godda Power
                value: SEZ + Telegraph Act + Aug 2024 amendment → only 100% export plant
                color: accent
              - key: 🌿 Western Ghats
                value: Conflict of interest documented; final clearance ultimately denied
                color: muted
    map:
      center:
        - 78.9629
        - 22.5937
      zoom: 4.2
      pitch: 0
      bearing: 0
      pins:

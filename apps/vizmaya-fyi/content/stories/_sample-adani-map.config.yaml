            title: Three Rules Changed
            items:
              - key: Experience required?
                value: Removed
                color: red
              - key: Airports per bidder
                value: No cap set
                color: red
              - key: Bid metric
                value: Per-passenger fee (highest wins)
                color: amber
              - key: DEA recommendation
                value: ≤ 2 airports per bidder
                color: muted
              - key: DEA note discussed?
                value: Not at 11 Dec 2018 PPPAC
                color: muted
              - key: Adani airports won
                value: All six (+ Mumbai in 2020)
                color: accent
        chart:
          - type: chart

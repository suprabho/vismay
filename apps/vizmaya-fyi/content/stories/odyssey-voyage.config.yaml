# Story config — odyssey-voyage  (CARTOGRAPHIC map story, style A)
#
# A scroll-driven prose rail over a live Mapbox map that flies from landfall to
# landfall. Charts attach via `chart: data:<id>` (JSON in odyssey-voyage/charts/).
# No `foreground:` panels — a foreground slot would suppress the prose rail
# (see map-story-authoring.md §3). Pins are coloured by identification status:
#   amber  = undisputed anchor (excavated)   accent2 = real navigation (Cape Malea)
#   accent = traditional / literary          teal    = excavated, Homeric link contested
#   muted  = contested (rival IDs)
# Every position after Cape Malea is contested; pins sit at the traditional
# candidate location. Coordinates are [lng, lat].

defaults:
  scroll:
    mode: continuous
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.72
  pinColor: "#a63a52"
  pinRadius: 8
  flySpeed: 1.1

sections:

  # ── HERO ──────────────────────────────────────────────
  - id: a-two-week-voyage-ten-years-long
    text: A Two-Week Voyage, Ten Years Long
    kind: hero
    eyebrow: "Homer's Odyssey · Troy → Ithaca · a contested map"
    mobileParagraphs: [0, 1]
    map:
      center: [17.0, 37.2]
      zoom: 4.1
      pitch: 0
      bearing: 0
      pins:
        - { coordinates: [26.24, 39.96], label: Troy, color: amber, radius: 8 }
        - { coordinates: [25.37, 40.96], label: Ismaros, color: amber, radius: 7 }
        - { coordinates: [23.19, 36.43], label: Cape Malea, color: accent2, radius: 8 }
        - { coordinates: [10.90, 33.80], label: Lotus-Eaters, color: muted, radius: 7 }
        - { coordinates: [15.16, 37.56], label: Cyclops, color: muted, radius: 7 }
        - { coordinates: [14.95, 38.47], label: Aeolus, color: muted, radius: 7 }
        - { coordinates: [15.00, 37.50], label: Laestrygonians, color: muted, radius: 7 }
        - { coordinates: [13.09, 41.24], label: Circe, color: accent, radius: 7 }
        - { coordinates: [20.53, 39.24], label: Underworld, color: teal, radius: 7 }
        - { coordinates: [14.43, 40.58], label: Sirens, color: accent, radius: 7 }
        - { coordinates: [15.63, 38.25], label: Scylla, color: accent, radius: 7 }
        - { coordinates: [14.00, 37.50], label: Thrinacia, color: muted, radius: 7 }
        - { coordinates: [14.28, 36.06], label: Calypso, color: accent, radius: 8 }
        - { coordinates: [19.92, 39.62], label: Scheria, color: accent, radius: 7 }
        - { coordinates: [20.71, 38.42], label: Ithaca, color: amber, radius: 8 }


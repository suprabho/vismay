# Story config — spacex-s1-2026
#
# The Orbital Stack: SpaceX S-1 2026 scrollytelling.
# 15 sections total: 1 hero + 14 story sections.
#
# KEY DESIGN: No map background. Chart-only layout.
#   All sections use `background: { type: none }` so the dark theme
#   CSS background (#030712) shows through.
#
#   Each story section has its own dedicated chart JSON file.
#   Charts are independently editable via the admin UI.
#
# CHART FILES (content/stories/spacex-s1-2026/charts/):
#   integrated-stack.json   — 3-layer financial flow (Space / Connectivity / AI)
#   the-algorithm.json      — SpaceX vs industry (deploy days / reuse / success)
#   launch-dominance.json   — payload to LEO comparison across rockets
#   global-connectivity.json— satellite count + subscriber growth 2020–2025
#   dead-zones.json         — Starlink mobile MAU / MNO partners / V3 capacity
#   ai-compute.json         — COLOSSUS I/II deploy days vs industry standard
#   data-engine.json        — X platform user funnel (1.3B → 117M Grok)
#   cost-per-token.json     — hardware / energy / speed / token (industry = 100)
#   grid-bottleneck.json    — compute demand (exponential) vs grid (flat), log scale
#   orbital-convergence.json— Manufacture 18% / Deploy 35% / Connect 82%
#   unfair-advantage.json   — radar: Terrestrial [3,3,3,4,3] vs Orbital [9,9,10,10,9]
#   tam-treemap.json        — $28.5T treemap: AI / Connectivity / Space
#   financial-engine.json   — waterfall: revenue → segment EBITDA → total
#   risks.json              — risk impact bars (4 categories, 6–9 / 10)

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0
  pinColor: "#f97316"
  pinRadius: 10
  flySpeed: 1.2

sections:

  # ── HERO ───────────────────────────────────────────────────────────────────
  - id: hero
    kind: hero
    text: "The Orbital Stack"
    eyebrow: "Technology · SpaceX S-1 2026 · May 2026"
    background:
      type: none

  # ── SECTION 1 ──────────────────────────────────────────────────────────────
  - id: integrated-stack
    background:
      type: none
    foreground:
      type: chart
      id: integrated-stack
    text: "The Integrated Stack"

  # ── SECTION 2 ──────────────────────────────────────────────────────────────

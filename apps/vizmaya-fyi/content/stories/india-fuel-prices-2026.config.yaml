# Story config — india-fuel-prices-2026
#
# Source: IEA Energy Prices Monthly Oil Prices Excerpt, May 2026 release
# (covers Jan 2015 – Apr 2026). Cross-country comparison restricted to the
# 33 countries in the IEA dataset by editorial choice.
#
# Repeating coordinates:
#   New Delhi             77.2090  28.6139
#   Mumbai                72.8777  19.0760
#   Jamnagar (refinery)   70.0577  22.4707  — Reliance + IOC, world's largest
#   Chennai (refinery)    80.2707  13.0827
#   Washington DC        -77.0369  38.9072
#   Tokyo                139.6917  35.6895
#   London                -0.1276  51.5074
#   Berlin                13.4050  52.5200
#   Brasília             -47.9292 -15.7801
#   Bucharest             26.1025  44.4268

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#e8a04f"
  pinRadius: 12
  flySpeed: 1.2

sections:

  # ═══════════════════════════════════════════════
  # HERO — Delhi pin on subcontinent
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "What a Litre Costs in India"
    eyebrow: "India · Fuel prices · May 2026"
    map:
      center: [78.0, 22.5]
      zoom: 3.6
      pitch: 20
      bearing: 0
      opacity: 0.45
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "New Delhi — pump price set by Centre + state"
          color: "#e8a04f"
          radius: 14
          pulse: true

  # ═══════════════════════════════════════════════
  # OPENING STAT — ₹101.99 (flat for 18 months)
  # ═══════════════════════════════════════════════

  - id: opening-stat
    kind: stat
    text: "₹101.99"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [78.0, 22.0]
      zoom: 4.0
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Delhi pump — ₹101.99/L"
          color: "#e8a04f"
          labelAnchor: right
        - coordinates: [72.8777, 19.0760]
          label: "Mumbai pump — set by Maharashtra VAT"
          color: "#e8a04f"
          labelAnchor: left
        - coordinates: [70.0577, 22.4707]
          label: "Jamnagar refinery — ex-refinery cost floats with crude"
          color: "#3a7a8c"
          labelAnchor: bottom
        - coordinates: [80.2707, 13.0827]
          label: "Chennai refinery"
          color: "#3a7a8c"
          labelAnchor: top
      mobile:
        center: [78.0, 22.0]
        zoom: 3.4

  # ═══════════════════════════════════════════════
  # THE LEAGUE TABLE — peer-set bar chart
  # ═══════════════════════════════════════════════

  - id: league-table
    text: "The league table"
    chart: data:league-table
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [25.0, 30.0]
      zoom: 1.5
      pitch: 10
      bearing: 0
      opacity: 0.50
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Delhi — $1.09/L"
          color: "#e8a04f"
          labelAnchor: right
        - coordinates: [139.6917, 35.6895]
          label: "Tokyo — $1.06/L"
          color: "#7c8088"
          labelAnchor: bottom
        - coordinates: [-77.0369, 38.9072]
          label: "Washington — $1.08/L"
          color: "#7c8088"
          labelAnchor: top
        - coordinates: [13.4050, 52.5200]
          label: "Berlin — $2.52/L"
          color: "#b04a3a"
          labelAnchor: right
        - coordinates: [-0.1276, 51.5074]
          label: "London — $2.11/L"
          color: "#b04a3a"
          labelAnchor: left
        - coordinates: [-47.9292, -15.7801]
          label: "Brasília — $1.34/L"
          color: "#7c8088"
          labelAnchor: right

  # ═══════════════════════════════════════════════
  # A DAY'S WAGES — affordability chart
  # ═══════════════════════════════════════════════

  - id: a-days-wages
    text: "A day's wages"
    chart: data:affordability
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [40.0, 28.0]
      zoom: 1.6
      pitch: 5
      bearing: 0
      opacity: 0.45
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "India — 7.4 L per day's income"
          color: "#e8a04f"
          labelAnchor: right
        - coordinates: [-97.0, 38.0]
          label: "USA — 226 L"
          color: "#7d9a6f"
          labelAnchor: top
        - coordinates: [-47.9292, -15.7801]
          label: "Brazil — 22 L"
          color: "#7c8088"
          labelAnchor: right
        - coordinates: [13.4050, 52.5200]
          label: "Germany — 60 L"
          color: "#7c8088"
          labelAnchor: right

  # ═══════════════════════════════════════════════
  # DECOUPLED FROM CRUDE — India vs USA USD line
  # ═══════════════════════════════════════════════

  - id: decoupled-from-crude
    text: "Decoupled from crude"
    chart: data:decoupled-from-crude
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [60.0, 25.0]
      zoom: 2.2
      pitch: 10
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Delhi — excise duty absorbs the swing"
          color: "#e8a04f"
          labelAnchor: right
        - coordinates: [-77.0369, 38.9072]
          label: "Washington — pumps track Brent"
          color: "#b04a3a"
          labelAnchor: top

  # ═══════════════════════════════════════════════
  # A 12-RUPEE GAP — diesel vs petrol chart
  # ═══════════════════════════════════════════════

  - id: twelve-rupee-gap
    text: "A 12-rupee gap"
    chart: data:diesel-petrol-gap
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [78.0, 22.0]
      zoom: 4.0
      pitch: 20
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Delhi — diesel ₹91.02, petrol ₹101.99"
          color: "#e8a04f"
          labelAnchor: right
        - coordinates: [88.3639, 22.5726]
          label: "Kolkata — diesel locomotives, port freight"
          color: "#3a7a8c"
          labelAnchor: bottom
        - coordinates: [85.1376, 25.5941]
          label: "Bihar — tubewell pumps run on diesel"
          color: "#3a7a8c"
          labelAnchor: right

  # ═══════════════════════════════════════════════
  # INDIA LOCKED IN — the INR flat-line chart
  # ═══════════════════════════════════════════════

  - id: india-locked-in
    text: "Eighteen months at ₹101.99"
    chart: data:india-locked-in
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [77.2090, 24.0]
      zoom: 4.4
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Delhi — May 2022 excise cut, last revision"
          color: "#e8a04f"
          labelAnchor: right

  # ═══════════════════════════════════════════════
  # CLOSE — what the number does and does not tell
  # ═══════════════════════════════════════════════

  - id: close
    text: "What the number does and does not tell"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    map:
      center: [78.0, 22.0]
      zoom: 3.8
      pitch: 20
      bearing: 0
      opacity: 0.50
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "New Delhi"
          color: "#e8a04f"
          labelAnchor: right

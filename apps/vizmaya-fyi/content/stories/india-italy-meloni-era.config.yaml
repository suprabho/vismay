      pitch: 15
      bearing: 0
      opacity: 0.60
      pins:
        - coordinates: [72.8777, 19.0760]
          label: "Mumbai · Tata Motors"
          color: "#e8a13a"
        - coordinates: [7.6869, 45.0703]
          label: "Turin · Iveco"
          color: "#3e8770"
          labelAnchor: top
      regions:
        level: country
        ramp: [0, 1]
        colors: ["$surface", "$accent"]
        items:
          - code: "IN"
            value: 1
          - code: "IT"
            value: 1
      mobile:
        center: [40.0, 32.0]
        zoom: 2.2

  # ═══════════════════════════════════════════════
  # ACT II — MEGADEALS THAT ANCHOR A DECADE
  # ═══════════════════════════════════════════════

  - id: act-ii

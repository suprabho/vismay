# Story config — india-italy-meloni-era
#
# Reader walks from the Delhi-to-Rome arc into the cadence of Modi-Meloni
# meetings (Bali, Delhi, Dubai, Borgo Egnazia, Rio, Joburg, Rome); descends
# into the trade story (Italy choropleth, India-Italy comparison); pivots
# through the megadeals (Tata-Iveco in Turin, Leonardo-Adani out of Rome);
# pans across the IMEC corridor (Mumbai/Mundra → UAE → Israel → Trieste);
# and closes on the diaspora and the Melodi soft-power moment in Rome.
#
# COORDINATES (capitals / focal cities):
#   New Delhi, India          77.2090, 28.6139
#   Mumbai, India             72.8777, 19.0760
#   Mundra (Gujarat port)     69.7177, 22.8394
#   Goa (Panaji), India       73.8278, 15.4909
#   Amritsar, India           74.8723, 31.6340
#   Rome, Italy               12.4964, 41.9028
#   Milan, Italy               9.1900, 45.4642
#   Turin, Italy (Iveco HQ)    7.6869, 45.0703
#   Trieste, Italy            13.7768, 45.6495
#   Genoa, Italy               8.9463, 44.4056
#   Naples, Italy             14.2681, 40.8518
#   Taranto, Italy            17.2473, 40.4640
#   Borgo Egnazia, Apulia     17.3589, 40.8417
#   Bergamo, Italy             9.6773, 45.6983
#   Denpasar, Bali           115.2126, -8.6705
#   Dubai, UAE                55.2708, 25.2048
#   Abu Dhabi, UAE            54.3773, 24.4539
#   Haifa, Israel             34.9896, 32.7940
#   Rio de Janeiro           -43.1729, -22.9068
#   Johannesburg, South Africa 28.0473, -26.2041
#
# Trade choropleth ramp (€ billion, bilateral merchandise trade calendar year):
#   IT, IN both highlighted in $accent (saffron) — the two-nation pair holds
#   the whole story; neighbours stay $surface.
#
# Megadeals beat colors:
#   Saffron $accent for the Indian principals (Tata in Mumbai, Adani in Delhi);
#   Italian green $accent2 for the Italian counterparts (Iveco in Turin,
#   Leonardo in Rome). Red $red is reserved for the Mediterranean disruption
#   marker (Suez/Red Sea) in the IMEC beat.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#e8a13a"
  pinRadius: 12
  flySpeed: 1.2
  mapPalette:
    land: "#0a1722"
    water: "#06101a"
    border: "#28384a"
    labelText: "#c8d1dc"
    labelHalo: "#06101a"

sections:

  # ═══════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "Mapped: The Melodi Era"
    eyebrow: "India · Italy · May 2026"
    map:
      center: [40.0, 32.0]
      zoom: 2.6
      pitch: 0
      bearing: 0
      opacity: 0.45

  # ═══════════════════════════════════════════════
  # OPENING STAT — 10 (Modi-Meloni interactions)
  # ═══════════════════════════════════════════════

  - id: meetings-stat
    kind: stat
    text: "10"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [40.0, 15.0]
      zoom: 1.6
      pitch: 0
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [115.2126, -8.6705]
          label: "Bali · Nov 2022"
          color: "#e8a13a"
        - coordinates: [77.2090, 28.6139]
          label: "New Delhi · Mar 2023 / Sep 2023"
          color: "#e8a13a"
        - coordinates: [55.2708, 25.2048]
          label: "Dubai · Dec 2023"
          color: "#e8a13a"
        - coordinates: [17.3589, 40.8417]
          label: "Borgo Egnazia · Jun 2024"
          color: "#e8a13a"
          labelAnchor: top
        - coordinates: [-43.1729, -22.9068]
          label: "Rio · Nov 2024"
          color: "#e8a13a"
        - coordinates: [28.0473, -26.2041]
          label: "Johannesburg · Nov 2025"
          color: "#e8a13a"
        - coordinates: [12.4964, 41.9028]
          label: "Rome · May 2026"
          color: "#e8a13a"
          labelAnchor: bottom
      mobile:
        center: [50.0, 15.0]
        zoom: 1.2

  # ═══════════════════════════════════════════════
  # BEAT — A RELATIONSHIP REDRAWN
  # ═══════════════════════════════════════════════

  - id: relationship-redrawn
    text: "A relationship redrawn"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [40.0, 35.0]
      zoom: 2.7
      pitch: 0
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "New Delhi"
          color: "#e8a13a"
        - coordinates: [12.4964, 41.9028]
          label: "Rome"
          color: "#3e8770"
          labelAnchor: top
      regions:
        level: country
        ramp: [0, 1]
        colors: ["$surface", "$accent2"]
        items:
          - code: "IN"
            value: 1
          - code: "IT"
            value: 1

  # ═══════════════════════════════════════════════
  # ACT I — THREE ARCHITECTURES IN THREE YEARS
  # ═══════════════════════════════════════════════

  - id: act-i
    text: "Act I: Three architectures in three years"
    chart: data:meeting-cadence
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [40.0, 35.0]
      zoom: 2.6
      pitch: 0
      bearing: 0
      opacity: 0.40
      regions:
        level: country
        ramp: [0, 1]
        colors: ["$surface", "$accent2"]
        items:
          - code: "IN"
            value: 1
          - code: "IT"
            value: 1

  # ═══════════════════════════════════════════════
  # STAT — €14.25B BILATERAL TRADE
  # ═══════════════════════════════════════════════

  - id: trade-stat
    kind: stat
    text: "€14.25B"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [12.5, 42.5]
      zoom: 5.0
      pitch: 25
      bearing: 0
      opacity: 0.60
      pins:
        - coordinates: [12.4964, 41.9028]
          label: "Rome"
          color: "#e8a13a"
        - coordinates: [9.1900, 45.4642]
          label: "Milan"
          color: "#e8a13a"
          labelAnchor: top
      regions:
        level: country
        ramp: [0, 1]
        colors: ["$surface", "$accent"]
        items:
          - code: "IT"
            value: 1
      mobile:
        center: [12.5, 43.0]
        zoom: 4.2

  - id: trade-doubled
    text: "Trade, nearly doubled"
    chart: data:trade-trajectory
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [40.0, 35.0]
      zoom: 2.7
      pitch: 0
      bearing: 0
      opacity: 0.40
      regions:
        level: country
        ramp: [0, 1]
        colors: ["$surface", "$accent"]
        items:
          - code: "IN"
            value: 1
          - code: "IT"
            value: 1

  # ═══════════════════════════════════════════════

# Story config — readiness-illusion-2026
#
# Map beats walk through the geography of India's tax compliance landscape:
# the four CFO roundtable cities (Delhi NCR, Mumbai, Bengaluru, Chennai),
# the Pune CFO quoted in Act I, and the Supreme Court / North Block in Delhi
# where the ₹5.76 lakh crore disputed-capital narrative lives.
#
# COORDINATES (approximate, public landmarks):
#   New Delhi (North Block / Ministry of Finance)   77.2147, 28.6131
#   Supreme Court of India, New Delhi               77.2398, 28.6224
#   Mumbai (Nariman Point — CFO district)           72.8226, 18.9256
#   Bengaluru (CGST Bengaluru North office)         77.5946, 12.9716
#   Chennai (Anna Salai — finance corridor)         80.2707, 13.0827
#   Pune (Hinjewadi — manufacturing CFO quote)      73.7400, 18.5908
#   India centroid                                  78.9629, 22.5937

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#7c3aed"
  pinRadius: 12
  flySpeed: 1.2
  highlightCountry: "IN"
  highlightColor: "#2a1a6a"

sections:

  # ═══════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "The Readiness Illusion"
    eyebrow: "State of Tax Assurance · 2026"
    map:
      center: [78.9629, 22.5937]
      zoom: 4.0
      pitch: 0
      bearing: 0
      opacity: 0.45

  # ═══════════════════════════════════════════════
  # OPENING — THE CONFIDENCE GAP (63% / 33%)

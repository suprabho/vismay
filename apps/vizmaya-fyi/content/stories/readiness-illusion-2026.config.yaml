      - [0, 1]
      - [1, 2]
    map:
      center: [72.8226, 18.9256]
      zoom: 11.0
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Delhi NCR — roundtable"
          color: "#7c3aed"
        - coordinates: [72.8226, 18.9256]
          label: "Mumbai — roundtable"
          color: "#7c3aed"
        - coordinates: [77.5946, 12.9716]
          label: "Bengaluru — roundtable"

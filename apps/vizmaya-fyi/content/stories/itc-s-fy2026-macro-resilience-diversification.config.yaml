defaults:
  storyBackground:
    type: color
    value: "#f6f4ef"
    fixed: true
  overlay:
    color: transparent
    opacity: 0
  panel:
    background: transparent
    border: none
  scroll:
    mode: snap
    paddingY: 12vh
  chart:
    theme: light-editorial
  progress: true
sections:
  - id: itc-s-resilient-fy2026
    text: ITC's Resilient FY2026
    kind: cover
    foreground:
      layout: stat-left-chart-right
      regions:
        left:
          - type: bigStat
            value: 80,867
            unit: Cr
            label: Standalone Gross Revenue (Rs Cr)
            align: left
          - type: text
            kind: text
            subheading: REVENUE GROWTH YoY
          - type: bigStat
            value: +10.1%
            unit: "%"
            label: Macroeconomic resilience
            align: left
          - type: text
            kind: text
            subheading: EBITDA GROWTH
          - type: bigStat
            value: +4.9%
            unit: "%"
            label: Rs 25,208 Crore
            align: left
        right:
          - type: chart
            id: segment-revenue-q4-fy26
    background:
      type: none


  - id: top-line-growth

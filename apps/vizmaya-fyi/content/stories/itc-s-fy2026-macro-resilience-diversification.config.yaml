  - id: segment-breakdown
    text: Segment Breakdown
    kind: data
    foreground:
      layout: text-left-chart-right
      regions:
        text:
          - type: bigStat
            value: 15%
            unit: "% YoY growth within standalone FMCG-Others segment for the final quarter of FY2026, driving the overarching top-line momentum across the non-cigarette businesses alongside a 60% surge in the digital-first and organic sub-segments to over an Rs 1,350 crore annual run rate, offsetting macroeconomic disruptions in the agri-business segment. The growth profile signifies the scaling of ITC's diversification strategy away from punitive tobacco tax impacts and into fast-moving consumer durables, hygiene, and nutrition categories anchored by the acquisition of Sresta Natural Bioproducts which integrates a sustainable network of 27,500 farmers nationwide and sets up a robust structural foundation against supply chain constraints caused by geopolitical uncertainties globally."
            label: FMCG-Others Q4 YoY Growth
            align: left
          - type: bigStat
            value: "15"
            unit: "% YoY growth within standalone FMCG-Others segment for the final quarter of FY2026, driving the overarching top-line momentum across the non-cigarette businesses alongside a 60% surge in the digital-first and organic sub-segments to over an Rs 1,350 crore annual run rate, offsetting macroeconomic disruptions in the agri-business segment. The growth profile signifies the scaling of ITC's diversification strategy away from punitive tobacco tax impacts and into fast-moving consumer durables, hygiene, and nutrition categories anchored by the acquisition of Sresta Natural Bioproducts which integrates a sustainable network of 27,500 farmers nationwide and sets up a robust structural foundation against supply chain constraints caused by geopolitical uncertainties globally."
            align: left
          - type: bigStat
            value: 15%
            label: FMCG-Others Q4 YoY Growth
            delta: ARR > Rs 1,350 cr (Organic/Digital)
            deltaColor: accent2
            color: positive
            align: left
          - type: bodyText
            from: text
            showHeading: false
            textStyle:
              size: normal
              color: text
        chart:
          - type: chart
            id: segment-revenue-q4-fy26
    background:
      type: none
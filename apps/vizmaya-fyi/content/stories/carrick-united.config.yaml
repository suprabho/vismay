# Story config — carrick-united
#
# Exercises every footshorts (fs:) viz module in one story: two animated
# tactics-board phases, the standings table, the standings-over-matchdays
# line chart, a match card / tile / row, and a knockout bracket. All data is
# hand-authored but shaped exactly like the live Supabase rows (StandingRow /
# FixtureRow) and the fs:* layer configs, so it's drop-in once a data source
# is wired up. `vertical: footshorts` in the .md frontmatter is what registers
# these modules before the slots look them up.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.4
  pinColor: '#d2122e'
  pinRadius: 12
  flySpeed: 1.2

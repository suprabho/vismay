# Story config — carrick-tactics-2026
#
# Demonstrates the `fs:tactics-board` viz module: an animated, data-driven SVG
# pitch driven by the canonical `phase` shape (frames + annotations) from
# footshorts-data/types/tactics.ts. Two phases play out a build-from-the-back
# move into a final-third cut-back. No map background — the board is the story.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.4
  pinColor: "#d2122e"
  pinRadius: 12
  flySpeed: 1.2


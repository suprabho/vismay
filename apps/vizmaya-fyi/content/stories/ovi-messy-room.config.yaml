# Ovi's Messy Room — phase 4 deliverable per docs/kidzovo-vertical-plan.md §9.
#
# Single-character arc (six panels): plays → throws → mess → notices → picks
# → done. Each panel composes kz-storybook regions:
#
#   background → /kidzovo-demo/panel-N.svg     (gradient placeholder)
#   caption    → third-person narration (text module)
#   stage      → Ovi via kz:character, pose pinned per panel
#   bubbles    → kz:bubble on the panels where Ovi self-talks (2, 4, 5)
#
# Ovi's .riv is still a placeholder (vizmaya-logo.riv) — pose changes are
# wired through the pose→stepInput pipeline but won't render visually
# until a real Ovi.riv with the `pose` state-machine input lands. The
# bubble likewise renders in CSS; see verticals/kidzovo-viz/.

defaults:
  mapStyle: mapbox://styles/mapbox/light-v11
  mapOpacity: 0.0
  pinColor: "#ff7aa9"
  pinRadius: 10
  flySpeed: 1.0

sections:
  - id: ovi-loves-to-play
    text: "Ovi loves to play"
    map:
      opacity: 0.0
    foreground:
      layout: kz-storybook
      regions:
        background:
          - type: image
            src: "/kidzovo-demo/panel-1.svg"
            alt: "Warm pink-to-cream gradient — Ovi's calm playroom"
            fit: cover
        caption:
          - type: text
            content: "Ovi loved to play in her room all day long."
        stage:
          - type: kz:character
            who: ovi
            pose:
              static: standing
            anchor: { x: center, y: bottom }

  - id: toys-go-everywhere
    text: "Toys go everywhere"
    map:
      opacity: 0.0
    foreground:
      layout: kz-storybook
      regions:
        background:
          - type: image
            src: "/kidzovo-demo/panel-2.svg"
            alt: "Teal-to-cream gradient — the play is at full speed"
            fit: cover
        caption:
          - type: text
            content: "She threw toys, crayons, socks, and clothes everywhere while playing."
        stage:
          - type: kz:character
            who: ovi
            pose:
              static: throwing
            anchor: { x: center, y: bottom }
        bubbles:
          - type: kz:bubble
            tone: loud
            speaker: ovi
            textStepwise:
              - "Wheeee!"

  - id: great-big-mess
    text: "A great big mess"
    map:
      opacity: 0.0
    foreground:
      layout: kz-storybook
      regions:
        background:
          - type: image
            src: "/kidzovo-demo/panel-3.svg"
            alt: "Pink-to-teal gradient — the room after the storm"
            fit: cover
        caption:
          - type: text
            content: "Soon her room was a great big mess."
        stage:
          - type: kz:character
            who: ovi
            pose:
              static: standing
            anchor: { x: center, y: bottom }

  - id: ovi-notices
    text: "Ovi notices"
    map:
      opacity: 0.0
    foreground:
      layout: kz-storybook
      regions:
        background:
          - type: image
            src: "/kidzovo-demo/panel-4.svg"
            alt: "Muted brown-to-teal gradient — a quieter moment"
            fit: cover
        caption:
          - type: text
            content: "Tired from playing, Ovi sat down and looked around."
        stage:
          - type: kz:character
            who: ovi
            pose:
              static: sitting
            anchor: { x: center, y: bottom }
        bubbles:
          - type: kz:bubble
            tone: thought
            speaker: ovi
            textStepwise:
              - "My room looks really messy."

  - id: one-toy-at-a-time
    text: "One toy at a time"
    map:
      opacity: 0.0
    foreground:
      layout: kz-storybook
      regions:
        background:
          - type: image
            src: "/kidzovo-demo/panel-5.svg"
            alt: "Warm amber-to-cream gradient — daylight and purpose"
            fit: cover
        caption:
          - type: text
            content: "Ovi picked up her toys, one by one, and put them back where they belonged."
        stage:
          - type: kz:character
            who: ovi
            pose:
              static: picking
            anchor: { x: center, y: bottom }
        bubbles:
          - type: kz:bubble
            tone: gentle
            speaker: ovi
            textStepwise:
              - "I can do this."

  - id: all-done
    text: "All done"
    map:
      opacity: 0.0
    foreground:
      layout: kz-storybook
      regions:
        background:
          - type: image
            src: "/kidzovo-demo/panel-6.svg"
            alt: "Soft pink-cream-teal gradient — the room is tidy again"
            fit: cover
        caption:
          - type: text
            content: "Soon everything was back where it belonged. Ovi smiled at her tidy room."
        stage:
          - type: kz:character
            who: ovi
            pose:
              static: standing
            anchor: { x: center, y: bottom }

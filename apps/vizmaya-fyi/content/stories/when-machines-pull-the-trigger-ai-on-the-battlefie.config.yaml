defaults:
  scroll:
    mode: continuous
  chart:
    theme: light-editorial

sections:

  # ─────────────────────────────────────────────
  # 1 · Cover — Minab school strike stat
  # ─────────────────────────────────────────────
  - id: a-school-in-minab-the-sharpest-edge-of-a
    kind: cover
    text: "A School in Minab: The Sharpest Edge of AI War"
    foreground:
      - type: bigStat
        value: "175+"
        unit: killed
        label: Minab school strike — mostly children
        delta: AI targeting systems in use across the campaign
        deltaColor: muted
        color: red
        align: left
        style:
          position: { x: right, y: center }
          size: { width: "44%" }
    map:
      center: [57.08, 27.09]
      zoom: 7.5
      pitch: 40
      bearing: 12
      pins:
        - coordinates: [57.0824, 27.0934]
          label: Minab, Iran — School Strike
          color: red
          radius: 10
          pulse: true

  # ─────────────────────────────────────────────
  # 2 · Three theatres — prose + deployment chart
  # ─────────────────────────────────────────────
  - id: from-ukraine-to-gaza-to-iran-ai-goes-to-
    kind: split
    text: "From Ukraine to Gaza to Iran: AI Goes to War"
    layout: text-left-chart-right
    foreground:
      - type: bodyText
        from: text
        style:
          position: { x: left, y: center }
          size: { width: "42%" }
      - type: chart
        id: ai-deployments-timeline
        caption: "AI systems deployed by theatre — reported scale"
        style:
          position: { x: right, y: center }
          size: { width: "50%", height: "60vh" }
    map:
      center: [40, 34]
      zoom: 3.0
      pitch: 20
      bearing: 8
      pins:
        - coordinates: [31, 49]
          label: Ukraine — Maven Smart System
          color: amber
        - coordinates: [34.78, 31.42]
          label: Gaza — Lavender AI
          color: red
        - coordinates: [57.08, 27.15]
          label: Minab, Iran — 175 killed
          color: red

  # ─────────────────────────────────────────────
  # 3 · Escalation ladder — quote + chart
  # ─────────────────────────────────────────────
  - id: the-escalation-ladder-from-cold-war-theo
    kind: data
    text: "The Escalation Ladder: From Cold War Theory to AI Reality"
    layout: text-left-chart-right
    foreground:
      - type: quote
        text: >-
          The scenarios we run have **felt a little bit less like science
          fiction** lately.
        attribution: >-
          Jacquelyn Schneider, Director, Hoover Wargaming & Crisis Simulation
          Initiative
        style:
          position: { x: left, y: center }
          size: { width: "42%" }
      - type: chart
        id: escalation-ladder
        caption: "Kahn's 44-rung ladder — AI systems compress the climb"
        style:
          position: { x: right, y: center }
          size: { width: "50%", height: "60vh" }
    map:
      center: [20, 20]
      zoom: 1.8
      pitch: 0
      bearing: 0
      opacity: 0.15

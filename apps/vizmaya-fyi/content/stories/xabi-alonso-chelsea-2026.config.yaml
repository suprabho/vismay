# Story config — xabi-alonso-chelsea-2026
# Clean football layout: persistent map suppressed on every section via
# `background: { type: none }`. The `map` field is still set to a placeholder
# because StorySectionConfig.map is non-optional in storyConfig.types.ts.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.0
  pinColor: "#d4af37"
  pinRadius: 12
  flySpeed: 1.2

sections:

  - id: hero
    kind: hero
    text: "Welcome home, Xabi"
    eyebrow: "Chelsea · May 2026"
    background:
      type: none
    map:
      center: [0, 0]
      zoom: 1

  - id: the-deal
    text: "The deal"
    background:
      type: none
    map:
      center: [0, 0]
      zoom: 1

  - id: invincible
    kind: stat
    text: "0"
    subheading: "losses in a Bundesliga season"
    color: amber
    background:
      type: none
    foreground:
      - type: fs:standings-table
        rows:
          - { competition_slug: bundesliga, season: '2023-24', team_id: bayer-leverkusen,    position: 1, played: 34, won: 28, draw: 6, lost: 0, goals_for: 89, goals_against: 24, goal_difference: 65, points: 90, form: WWWWW, team: { id: bayer-leverkusen,    slug: bayer-leverkusen,    name: Bayer Leverkusen,    crest_url: null } }

  # ═══════════════════════════════════════════════

  - id: monsoon-forecast-section
    text: "The driest first forecast in twenty-five years"
    chart: data:monsoon-forecast
    map:
      center: [80.0, 22.0]
      zoom: 4.2
      pitch: 20
      bearing: 0
      opacity: 0.50
      pins:

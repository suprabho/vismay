      - text: "The chokepoint reopens — at a cost > Four weeks of price"
      - text: "The chokepoint reopens — at a cost > Fertilizer is the second-order shock"
      - text: "The chokepoint reopens — at a cost > The subsidy will have to swallow it"

  # ═══════════════════════════════════════════════

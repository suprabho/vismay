    subsections:
      - text: "The driest first forecast in twenty-five years > Ninety-two percent of the long-period average"
      - text: "The driest first forecast in twenty-five years > El Niño at 98%"
      - text: "The driest first forecast in twenty-five years > Three farmers, three timings"
      - text: "The driest first forecast in twenty-five years > The market hasn't waited"

  # ═══════════════════════════════════════════════

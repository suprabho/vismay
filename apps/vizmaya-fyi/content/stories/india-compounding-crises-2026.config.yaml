          color: "#b04a3a"
          labelAnchor: left
        - coordinates: [51.5310, 25.2854]
          label: "Doha — LNG origin"
          color: "#3a7a8c"
          labelAnchor: bottom
        - coordinates: [70.2167, 23.0000]

# Story config — india-compounding-crises-2026
#
# Source artifact: India 2026 Compounding Crises report (May 2026 fortnight).
# Four shocks layered in one fortnight: extreme heat + weak monsoon forecast +
# Strait of Hormuz closure aftermath + rupee/GDP downgrade.
#
# Repeating coordinates:
#   New Delhi              77.2090  28.6139
#   Mumbai (RBI, refiners) 72.8777  19.0760
#   Najafgarh (UHI)        76.9799  28.6093
#   Sirsa (Thar fringe)    75.0228  29.5345
#   Phalodi (Thar)         72.3636  27.1316
#   Barmer (Thar)          71.3833  25.7521
#   Jamnagar refinery      70.0577  22.4707
#   Kandla LNG terminal    70.2167  23.0000
#   Dahej LNG terminal     72.5800  21.7080
#   Strait of Hormuz       56.2500  26.5667
#   Bandar Abbas (Iran)    56.2667  27.1865
#   Doha (LNG origin)      51.5310  25.2854
#   Nagpur (cotton belt)   79.0882  21.1458
#   Patna (paddy belt)     85.1376  25.5941

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#e8a04f"
  pinRadius: 12
  flySpeed: 1.2

sections:

  # ═══════════════════════════════════════════════
  # HERO — subcontinent, Delhi pin
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "India 2026: Four Shocks at Once"
    eyebrow: "India · Macro · May 2026"
    map:
      center: [78.0, 22.5]
      zoom: 3.4
      pitch: 20
      bearing: 0
      opacity: 0.45
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "New Delhi — where the four lines cross"
          color: "#e8a04f"
          radius: 14
          pulse: true

  # ═══════════════════════════════════════════════
  # OPENING STAT — 270.82 GW grid record
  # ═══════════════════════════════════════════════

  - id: opening-stat
    kind: stat
    text: "270.82 GW"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [78.0, 22.0]
      zoom: 4.0
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Delhi — May 21 grid peak, 14:32 IST"
          color: "#e8a04f"
          labelAnchor: right
        - coordinates: [76.9799, 28.6093]
          label: "Najafgarh — urban heat-island hotspot"
          color: "#b04a3a"
          labelAnchor: bottom
        - coordinates: [75.0228, 29.5345]
          label: "Sirsa — eight days above 47°C"
          color: "#b04a3a"
          labelAnchor: top
      mobile:
        center: [78.0, 22.0]
        zoom: 3.4

  # ═══════════════════════════════════════════════
  # HEAT CITIES — Copernicus top-100 share
  # ═══════════════════════════════════════════════

  - id: heat-cities
    text: "A country in the wrong half of the list"
    chart: data:hottest-cities
    map:
      center: [73.0, 27.0]
      zoom: 5.0
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [72.3636, 27.1316]
          label: "Phalodi — 47°C+"
          color: "#b04a3a"
          labelAnchor: top
        - coordinates: [71.3833, 25.7521]
          label: "Barmer — Thar fringe"
          color: "#b04a3a"
          labelAnchor: right
        - coordinates: [75.0228, 29.5345]
          label: "Sirsa — 8 consecutive days"
          color: "#b04a3a"
          labelAnchor: bottom
        - coordinates: [76.9799, 28.6093]
          label: "Najafgarh — urban heat island"
          color: "#e8a04f"
          labelAnchor: left
    subsections:
      - text: "A country in the wrong half of the list > Ninety-seven of the hottest hundred"
      - text: "A country in the wrong half of the list > No longer a coincidence"
      - text: "A country in the wrong half of the list > Where the loss is paid"


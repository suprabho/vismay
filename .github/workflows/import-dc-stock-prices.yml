name: Import AI Data Centers stock prices

# Weekday pull of daily OHLCV bars for every active dc_stocks ticker from
# Yahoo Finance's keyless v8 chart API, upserted into dc_stock_prices. Each
# company trades on its home exchange (NASDAQ/NYSE, TWSE, KRX, TSE, Euronext
# Amsterdam, HKEX), so one run after the US close also captures that day's
# completed Asian and European sessions. Idempotent on (ticker, trade_date) —
# the default 1mo window overlaps generously and re-runs simply overwrite.
#
# First deploy: dispatch once with full_backfill=true to load 5 years of
# history, then let the schedule keep it fresh.
#
# Required repo secrets (in the `Production` environment so secrets.X resolves):
#   NEXT_PUBLIC_SUPABASE_URL   — same value as Vercel env
#   SUPABASE_SERVICE_ROLE_KEY  — service role key for dc_stock_prices writes
# Plus ONE of these — Yahoo 429s the shared Actions runner IP, so the run needs
# to egress from a residential IP to stay green (data is still Yahoo's either way):
#   MASSIVE_API_TOKEN  — Massive Render API key; fetches each Yahoo URL from
#     Massive's residential network (format=raw ⇒ raw JSON). Simplest, one key.
#   STOCKS_HTTPS_PROXY — residential proxy URL (http://user:pass@host:port).
# With neither, the run makes direct requests, which CI usually rate-limits.

on:
  schedule:
    # 22:45 UTC Mon–Fri — after the US close (21:00 UTC in winter, 20:00 in
    # summer) with slack for Yahoo's feed to settle; the :45 offset avoids
    # the top-of-hour Actions queue spike.
    - cron: '45 22 * * 1-5'
  workflow_dispatch:
    inputs:
      full_backfill:
        description: 'Backfill 5 years of history instead of the 1-month incremental window'
        type: boolean
        default: false

concurrency:
  group: import-dc-stock-prices
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    # Generous: the importer pauses run-wide on Yahoo 429s and makes up to
    # three passes with 90s/180s cool-downs when the runner IP is throttled.
    timeout-minutes: 30
    environment: Production
    defaults:
      run:
        working-directory: apps/vizmaya-fyi

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 picks it up from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket which Node 20 doesn't have.
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Import stock prices
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MASSIVE_API_TOKEN: ${{ secrets.MASSIVE_API_TOKEN }}
          STOCKS_HTTPS_PROXY: ${{ secrets.STOCKS_HTTPS_PROXY }}
        run: pnpm ai-data-centers:import-stocks ${{ inputs.full_backfill && '-- --full' || '' }}

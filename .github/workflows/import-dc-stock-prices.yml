name: Import AI Data Centers stock prices

# Weekday pull of daily OHLCV bars for every active dc_stocks ticker, upserted
# into dc_stock_prices. US tickers come from the massive.com market-data API;
# the international tickers (TWSE, KRX, TSE, Euronext Amsterdam, HKEX) come from
# Stooq's keyless daily CSV — massive.com is US-only. One run after the US close
# also captures that day's completed Asian and European sessions. Idempotent on
# (ticker, trade_date) — the default window overlaps generously and re-runs
# simply overwrite.
#
# First deploy: dispatch once with full_backfill=true to load ~5 years of
# history, then let the schedule keep it fresh.
#
# Required repo secrets (in the `Production` environment so secrets.X resolves):
#   NEXT_PUBLIC_SUPABASE_URL   — same value as Vercel env
#   SUPABASE_SERVICE_ROLE_KEY  — service role key for dc_stock_prices writes
#   MASSIVE_API_TOKEN          — massive.com market-data API key. Powers the US
#     tickers; the international tickers use Stooq's keyless CSV, so no other
#     data secret is needed.

on:
  schedule:
    # 22:45 UTC Mon–Fri — after the US close (21:00 UTC in winter, 20:00 in
    # summer) with slack for the feeds to settle; the :45 offset avoids the
    # top-of-hour Actions queue spike.
    - cron: '45 22 * * 1-5'
  workflow_dispatch:
    inputs:
      full_backfill:
        description: 'Backfill 5 years of history instead of the 1-month incremental window'
        type: boolean
        default: false

concurrency:
  group: import-dc-stock-prices
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    # Generous: massive.com's free tier rate-limits, so the importer glides
    # under it behind a run-wide 429 cooldown; 30 min is ample headroom.
    timeout-minutes: 30
    environment: Production
    defaults:
      run:
        working-directory: apps/vizmaya-fyi

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 picks it up from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket which Node 20 doesn't have.
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Import stock prices
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MASSIVE_API_TOKEN: ${{ secrets.MASSIVE_API_TOKEN }}
        run: pnpm ai-data-centers:import-stocks ${{ inputs.full_backfill && '-- --full' || '' }}

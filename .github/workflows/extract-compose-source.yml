name: Extract compose source

# Triggered by the compose upload route's `workflow_dispatch` POST when a PDF,
# Office doc (Word/PowerPoint/Excel) or EPub is added to a story. markitdown (a
# Python CLI) converts the file to Markdown; scanned/graphical PDFs fall back to
# a vision model (Claude Sonnet, Gemini fallback). Neither runs in the Next
# runtime — markitdown is Python, and a long PDF's vision pass can't fit a
# serverless function's time limit — but a GitHub runner installs markitdown and
# has no such cap. The worker writes the extracted text straight back onto the
# `story_sources` row; the compose UI polls until it flips to `extracted`. Same
# dispatch lane as render-video.yml.
#
# Required secrets (Production environment):
#   NEXT_PUBLIC_SUPABASE_URL   — same value as in Vercel env
#   SUPABASE_SERVICE_ROLE_KEY  — service role key for storage + row writes
#   AI_GATEWAY_API_KEY         — Vercel AI Gateway key for the model calls

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: story_sources row id to extract
        required: true
        type: string
      slug:
        description: Story slug the source belongs to (for logs/traceability)
        required: false
        type: string
        default: ''

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Resolve secrets.X from the Production environment, where the Supabase +
    # gateway secrets are already configured (matches render-video.yml).
    environment: Production
    defaults:
      run:
        working-directory: apps/admin

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 reads it from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket; pdf-parse's
          # @napi-rs/canvas ships a linux-x64 prebuilt that installs here.
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      # markitdown is the primary extractor (Office/EPub/text-layer PDF →
      # Markdown). Python-only, so it's installed here, not in the Next runtime.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install markitdown
        run: pip install 'markitdown[all]'

      - name: Extract
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: pnpm exec tsx scripts/extract-compose-source.ts "${{ inputs.source_id }}"

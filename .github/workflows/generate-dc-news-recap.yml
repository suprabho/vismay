name: Generate AI Data Centers news recap

# Daily markdown brief over the trailing 24h of dc_news: Gemini writes the
# headline/overview/themes, the worker attaches the linked stories and the
# tracked stocks' latest daily moves, and the result is inserted as a snapshot
# into dc_news_recaps (served by /api/ai-data-centers/recap). Each run appends
# a new row, so re-runs and manual dispatches are safe — readers take the
# newest snapshot.
#
# Scheduled 90 minutes after the 06:45 UTC dc_news scrape
# (scrape-ai-data-centers-news.yml) so the day's classified stories are in the
# table before the recap reads them.
#
# Required repo secrets (in the `Production` environment so secrets.X resolves):
#   NEXT_PUBLIC_SUPABASE_URL   — same value as Vercel env
#   SUPABASE_SERVICE_ROLE_KEY  — read dc_news/dc_stock_prices, write dc_news_recaps
#   GEMINI_API_KEY             — narrative layer (shared with render-audio);
#                                without it the recap degrades to
#                                deterministic-only topic groupings

on:
  schedule:
    # 08:15 UTC daily — after the 06:45 news scrape has settled; the :15
    # offset avoids the top-of-hour Actions queue spike and staggers off the
    # other vizmaya crons (06:15 energy, 06:45 dc news, 22:45 dc stocks).
    - cron: '15 8 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'Trailing window length in hours'
        required: false
        default: '24'

concurrency:
  group: generate-dc-news-recap
  cancel-in-progress: false

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    defaults:
      run:
        working-directory: apps/vizmaya-fyi

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 picks it up from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket which Node 20 doesn't have.
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate news recap
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm ai-data-centers:news-recap -- --hours ${{ github.event.inputs.hours || '24' }}

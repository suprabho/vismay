name: Footshorts - scores refresh

# Pulls the latest finished-match scores from football-data.org into the
# footshorts Supabase. Update-only (never inserts) and idempotent, so it's safe
# to re-run. Runs every 3 hours to keep results fresh.
#
# Recaps and their event-sync prerequisites are DECOUPLED from this workflow:
# they run on their own twice-daily schedule in footshorts-recap.yml. Keeping
# scores on its own job means a 3-hourly top-up never drags along the
# Gemini / API-Football / Sportradar budgets a recap consumes, and a recap
# failure can't fail the scores refresh (or vice versa).
#
# Required repo secrets (in `Production` — shared project-wide with vizmaya /
# vizf1 / energy-profile workflows):
#   NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   FOOTBALL_DATA_TOKEN          - football-data.org API token (footshorts-only)

on:
  schedule:
    # Every 3 hours. Knockout matches finish ~18:00-01:00 UTC and a 3-hourly
    # cadence caps how long a result stays stale at ~3h. GH cron is UTC and can
    # drift up to ~15 min under load (in practice we've seen scheduled runs land
    # 2-3h late).
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      competitions:
        description: 'Comma-separated football-data codes to limit to (e.g. WC,PL). Blank = all.'
        required: false
        default: ''

# Shared with footshorts-fixtures: both hit the same FOOTBALL_DATA_TOKEN
# (10 req/min free tier), so serialise them to stop a manual dispatch of one
# overlapping a scheduled run of the other and tripping a 429.
concurrency:
  group: footshorts-football-data
  cancel-in-progress: false

jobs:
  scores:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    defaults:
      run:
        working-directory: apps/footshorts/worker

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 picks it up from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket which Node 20 doesn't have.
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Refresh scores
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        # Empty on scheduled runs → all competitions; set via workflow_dispatch to scope.
        run: pnpm scores:ci -- --competitions="${{ inputs.competitions }}"

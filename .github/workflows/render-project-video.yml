name: Render project video

# Triggered by the API route's `workflow_dispatch` POST when a freeform video
# project needs (re)rendering. Runs on ubuntu-latest because we need real
# ffmpeg + Chromium binaries — Vercel-style serverless can't host this
# synchronously, and GitHub Actions runners can.
#
# Required repo secrets:
#   NEXT_PUBLIC_SUPABASE_URL       — same value as in Vercel env
#   SUPABASE_SERVICE_ROLE_KEY      — service role key for storage writes
#   NEXT_PUBLIC_MAPBOX_TOKEN       — clips may embed Mapbox-backed layers

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: Video project id
        required: true
        type: string
      aspect:
        description: Output aspect ratio
        required: true
        type: choice
        options:
          - '9:16'
          - '16:9'
      base_url:
        description: Site URL the headless browser should hit
        required: true
        type: string
        default: https://vizmaya.fyi

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Pull NEXT_PUBLIC_SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY /
    # NEXT_PUBLIC_MAPBOX_TOKEN from the `Production` environment's secrets.
    environment: Production
    defaults:
      run:
        working-directory: apps/vizmaya-fyi

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 picks it up from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket which Node 20 doesn't have.
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # `--with-deps` pulls the system libs Chromium needs (libnss3, etc.).
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Render
        env:
          CONTENT_SOURCE: db
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          BASE_URL: ${{ inputs.base_url }}
        # `--force` because cache-miss is the only reason this workflow runs.
        run: |
          pnpm exec tsx scripts/generate-project-video.ts \
            "${{ inputs.project_id }}" \
            "${{ inputs.aspect }}" \
            --force

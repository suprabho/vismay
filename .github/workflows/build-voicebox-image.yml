name: Deploy voicebox TTS server

# Builds the upstream voicebox image at the pinned SHA below, layers the
# Caddy bearer-token proxy from infra/voicebox/ on top, and deploys it to
# the Fly app `vismay-voicebox`. Runs on pushes touching infra/voicebox/**
# or manually via workflow_dispatch (e.g. after bumping VOICEBOX_REF).
#
# After every VOICEBOX_REF bump, re-run the API contract verification
# checklist in docs/voicebox-tts.md before pointing production at it.
#
# Required repo secret (Production environment):
#   FLY_DEPLOY_TOKEN — app-scoped deploy token
#                      (`fly tokens create deploy -a vismay-voicebox`)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/voicebox/**'
      - '.github/workflows/build-voicebox-image.yml'

env:
  # Pinned upstream commit of jamiepine/voicebox — bump deliberately.
  VOICEBOX_REF: b542768429d39dba5aab1568c797661aef4bedfd

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - name: Build upstream voicebox at pinned SHA
        run: docker build -t "voicebox-upstream:${VOICEBOX_REF}" "https://github.com/jamiepine/voicebox.git#${VOICEBOX_REF}"

      - name: Layer Caddy auth proxy
        run: |
          docker build \
            -t "registry.fly.io/vismay-voicebox:${VOICEBOX_REF}" \
            --build-arg "VOICEBOX_BASE=voicebox-upstream:${VOICEBOX_REF}" \
            infra/voicebox

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Push and deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
        run: |
          flyctl auth docker
          docker push "registry.fly.io/vismay-voicebox:${VOICEBOX_REF}"
          flyctl deploy \
            -c infra/voicebox/fly.toml \
            --image "registry.fly.io/vismay-voicebox:${VOICEBOX_REF}"

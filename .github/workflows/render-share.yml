name: Render share assets

# Triggered by /api/admin/demos/[id]/render-share or
# /api/admin/social/posts/[id]/render-share. Runs Playwright on
# ubuntu-latest to drive /story/<slug>/share and upload PNGs to the
# story-share bucket.
#
# Two modes: 'demo' renders a demo's curated card set at all 3 ratios;
# 'post' renders the cards referenced by a single social post at the
# post's ratio.
#
# Same secrets as render-pdf.yml. No ffmpeg required.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: demo | post
        required: true
        type: choice
        options:
          - demo
          - post
        default: demo
      demo_id:
        description: Demo row id (when mode=demo)
        required: false
        type: string
        default: ''
      post_id:
        description: Social post id (when mode=post)
        required: false
        type: string
        default: ''
      base_url:
        description: Site URL the headless browser should hit
        required: true
        type: string
        default: https://vizmaya.fyi

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    defaults:
      run:
        working-directory: apps/vizmaya-fyi

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 picks it up from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket which Node 20 doesn't have.
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Render share assets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          BASE_URL: ${{ inputs.base_url }}
        run: |
          if [ "${{ inputs.mode }}" = "demo" ]; then
            pnpm exec tsx scripts/generate-share.ts demo "${{ inputs.demo_id }}"
          else
            pnpm exec tsx scripts/generate-share.ts post "${{ inputs.post_id }}"
          fi

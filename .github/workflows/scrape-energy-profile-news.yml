name: Scrape Energy Profile news

# Daily pull of Google News' RSS search for "International Energy Agency".
# Each new article is tagged with ISO country codes via Gemini and upserted
# into the iea_news table. Idempotent on source_url, so re-runs and manual
# dispatches are safe.
#
# We use Google News rather than iea.org directly because IEA's site fronts
# a Cloudflare-protected SPA — plain fetch 403s from cloud IPs and Playwright
# either trips bot detection or times out on selectors. Google News surfaces
# the same stories (with broader coverage) and works from any IP.
#
# Required repo secrets (in the `Production` environment so secrets.X resolves):
#   NEXT_PUBLIC_SUPABASE_URL   — same value as Vercel env
#   SUPABASE_SERVICE_ROLE_KEY  — service role key for iea_news writes
#   GEMINI_API_KEY             — Gemini API key for country tagging

on:
  schedule:
    # 06:15 UTC daily — picks up overnight news before US/EU work hours.
    # The :15 offset avoids the top-of-hour Actions queue spike.
    - cron: '15 6 * * *'
  workflow_dispatch:

concurrency:
  group: scrape-energy-profile-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production
    defaults:
      run:
        working-directory: apps/vizmaya-fyi

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 picks it up from the root
      # package.json's `packageManager` field and rejects having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/realtime-js needs native WebSocket which Node 20 doesn't have.
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Scrape Energy Profile news
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm energy-profile:scrape
